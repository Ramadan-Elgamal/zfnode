<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%" role="img" aria-labelledby="title desc">
  <title id="title">zfnode logo</title>
  <desc id="desc">A dark rounded-square badge with a cyan-to-green zigzag mark and blue accent dot.</desc>
  <defs>
    <linearGradient id="zf-primary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4" />
      <stop offset="100%" stop-color="#10B981" />
    </linearGradient>
    <linearGradient id="zf-accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#06B6D4" />
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="112" fill="#0B0F19" />

  <rect width="504" height="504" x="4" y="4" rx="108" fill="none" stroke="#1E293B" stroke-width="8" />

  <path
    d="M 130 150 L 320 150 L 210 256 L 350 256 L 150 380"
    fill="none"
    stroke="url(#zf-primary)"
    stroke-width="48"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <circle cx="360" cy="370" r="32" fill="url(#zf-accent)" />
</svg>
